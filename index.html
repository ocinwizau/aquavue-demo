<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Aqua Vue Demo</title>
</head>
<body>
  <h1>Aqua Vue Chatbot Demo</h1>
  <p>This page will load the Aqua Vue Botpress chat widget.</p>
  <!-- Botpress webchat placeholder; replace HOST_URL with your Botpress server if needed -->
  <script src="https://cdn.botpress.cloud/webchat/v1/inject.js"></script>
  <script>
    window.botpressWebChat.init({
      botId: "Aqua Vue Cafe Bot",
      hostUrl: "https://your-botpress-server.com" // replace with your Botpress endpoint
    })
  </script>
</body>
</html>
