<!DOCTYPE html>

<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Pearl – Freedom Ecotours</title>
 <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
 <style>
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
 --ocean-deep: #0a1f2e;
 --ocean-mid: #0e3347;
 --teal: #1a7a6e;
 --teal-light: #2aab99;
 --foam: #c8ede8;
 --pearl: #f0f7f6;
 --sand: #e8dcc8;
 --gold: #c9a96e;
 --text: #e8f4f2;
 --text-muted: #8ab5ae;
 --bubble-user: #1a7a6e;
 --bubble-bot: rgba(255,255,255,0.06);
}

body {
 font-family: 'DM Sans', sans-serif;
 background: var(--ocean-deep);
 color: var(--text);
 height: 100dvh;
 display: flex;
 flex-direction: column;
 overflow: hidden;
 position: relative;
}

/* Animated ocean background */
body::before {
 content: '';
 position: fixed;
 inset: 0;
 background:
 radial-gradient(ellipse at 20% 50%, rgba(26,122,110,0.15) 0%, transparent 60%),
 radial-gradient(ellipse at 80% 20%, rgba(14,51,71,0.8) 0%, transparent 50%),
 radial-gradient(ellipse at 60% 80%, rgba(42,171,153,0.08) 0%, transparent 40%);
 animation: oceanPulse 8s ease-in-out infinite alternate;
 pointer-events: none;
 z-index: 0;
}

@keyframes oceanPulse {
 0% { opacity: 0.7; transform: scale(1); }
 100% { opacity: 1; transform: scale(1.02); }
}

/* Floating particles */
.particles {
 position: fixed;
 inset: 0;
 pointer-events: none;
 z-index: 0;
 overflow: hidden;
}
.particle {
 position: absolute;
 border-radius: 50%;
 background: rgba(42,171,153,0.3);
 animation: float linear infinite;
}
@keyframes float {
 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
 10% { opacity: 1; }
 90% { opacity: 0.5; }
 100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
}

/* Header */
.header {
 position: relative;
 z-index: 10;
 padding: 16px 20px;
 display: flex;
 align-items: center;
 gap: 14px;
 border-bottom: 1px solid rgba(42,171,153,0.15);
 background: rgba(10,31,46,0.8);
 backdrop-filter: blur(12px);
}

.avatar {
 width: 46px;
 height: 46px;
 border-radius: 50%;
 background: linear-gradient(135deg, var(--teal), var(--teal-light));
 display: flex;
 align-items: center;
 justify-content: center;
 font-size: 22px;
 flex-shrink: 0;
 box-shadow: 0 0 20px rgba(42,171,153,0.4);
 animation: glow 3s ease-in-out infinite alternate;
}

@keyframes glow {
 0% { box-shadow: 0 0 15px rgba(42,171,153,0.3); }
 100% { box-shadow: 0 0 30px rgba(42,171,153,0.6); }
}

.header-info { flex: 1; }
.header-name {
 font-family: 'Cormorant Garamond', serif;
 font-size: 20px;
 font-weight: 600;
 letter-spacing: 0.03em;
 color: var(--pearl);
}
.header-sub {
 font-size: 11px;
 color: var(--teal-light);
 letter-spacing: 0.08em;
 text-transform: uppercase;
 margin-top: 1px;
}

.status-dot {
 width: 8px; height: 8px;
 border-radius: 50%;
 background: #4ade80;
 box-shadow: 0 0 8px #4ade80;
 animation: pulse 2s infinite;
}
@keyframes pulse {
 0%, 100% { opacity: 1; }
 50% { opacity: 0.4; }
}

/* Quick chips */
.chips-row {
 position: relative;
 z-index: 10;
 padding: 10px 16px;
 display: flex;
 gap: 8px;
 overflow-x: auto;
 scrollbar-width: none;
 border-bottom: 1px solid rgba(42,171,153,0.08);
 background: rgba(10,31,46,0.6);
}
.chips-row::-webkit-scrollbar { display: none; }

.chip {
 flex-shrink: 0;
 padding: 5px 13px;
 border-radius: 20px;
 border: 1px solid rgba(42,171,153,0.35);
 background: rgba(42,171,153,0.08);
 color: var(--teal-light);
 font-size: 12px;
 font-family: 'DM Sans', sans-serif;
 cursor: pointer;
 transition: all 0.2s;
 white-space: nowrap;
}
.chip:hover {
 background: rgba(42,171,153,0.2);
 border-color: var(--teal-light);
 color: var(--pearl);
}

/* Chat area */
.chat {
 flex: 1;
 overflow-y: auto;
 padding: 20px 16px;
 display: flex;
 flex-direction: column;
 gap: 16px;
 position: relative;
 z-index: 5;
 scrollbar-width: thin;
 scrollbar-color: rgba(42,171,153,0.2) transparent;
}

.msg {
 display: flex;
 gap: 10px;
 max-width: 88%;
 animation: msgIn 0.3s ease-out;
}
@keyframes msgIn {
 from { opacity: 0; transform: translateY(8px); }
 to { opacity: 1; transform: translateY(0); }
}

.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.bot { align-self: flex-start; }

.msg-avatar {
 width: 32px; height: 32px;
 border-radius: 50%;
 background: linear-gradient(135deg, var(--teal), var(--teal-light));
 display: flex; align-items: center; justify-content: center;
 font-size: 15px;
 flex-shrink: 0;
 margin-top: 2px;
}

.bubble {
 padding: 11px 15px;
 border-radius: 18px;
 font-size: 14px;
 line-height: 1.55;
 max-width: 100%;
}

.msg.bot .bubble {
 background: var(--bubble-bot);
 border: 1px solid rgba(42,171,153,0.15);
 color: var(--text);
 border-radius: 4px 18px 18px 18px;
 backdrop-filter: blur(8px);
}

.msg.user .bubble {
 background: var(--teal);
 color: #fff;
 border-radius: 18px 4px 18px 18px;
}

/* Typing indicator */
.typing { display: flex; gap: 5px; align-items: center; padding: 14px 15px; }
.typing span {
 width: 7px; height: 7px;
 border-radius: 50%;
 background: var(--teal-light);
 animation: typingDot 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingDot {
 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
 30% { transform: translateY(-5px); opacity: 1; }
}

/* Input area */
.input-area {
 position: relative;
 z-index: 10;
 padding: 12px 16px 16px;
 background: rgba(10,31,46,0.9);
 backdrop-filter: blur(12px);
 border-top: 1px solid rgba(42,171,153,0.15);
}

.input-wrap {
 display: flex;
 align-items: flex-end;
 gap: 10px;
 background: rgba(255,255,255,0.05);
 border: 1px solid rgba(42,171,153,0.25);
 border-radius: 24px;
 padding: 10px 10px 10px 16px;
 transition: border-color 0.2s;
}
.input-wrap:focus-within {
 border-color: rgba(42,171,153,0.6);
}

textarea {
 flex: 1;
 background: transparent;
 border: none;
 outline: none;
 color: var(--text);
 font-family: 'DM Sans', sans-serif;
 font-size: 14px;
 resize: none;
 max-height: 100px;
 line-height: 1.5;
}
textarea::placeholder { color: var(--text-muted); }

.send-btn {
 width: 36px; height: 36px;
 border-radius: 50%;
 background: linear-gradient(135deg, var(--teal), var(--teal-light));
 border: none;
 cursor: pointer;
 display: flex; align-items: center; justify-content: center;
 flex-shrink: 0;
 transition: transform 0.15s, box-shadow 0.15s;
 color: white;
}
.send-btn:hover {
 transform: scale(1.08);
 box-shadow: 0 0 16px rgba(42,171,153,0.5);
}
.send-btn:active { transform: scale(0.95); }
.send-btn svg { width: 16px; height: 16px; }

.footer-note {
 text-align: center;
 font-size: 10px;
 color: var(--text-muted);
 margin-top: 8px;
 letter-spacing: 0.04em;
}

/* Wave decoration */
.wave-decoration {
 position: fixed;
 bottom: 0;
 left: 0;
 right: 0;
 height: 120px;
 pointer-events: none;
 z-index: 1;
 opacity: 0.06;
}

 </style>
</head>
<body>

 <!-- Floating particles -->

 <div class="particles" id="particles"></div>

 <!-- Header -->

 <div class="header">
 <div class="avatar">🐋</div>
 <div class="header-info">
 <div class="header-name">Pearl</div>
 <div class="header-sub">Freedom Ecotours · Hervey Bay</div>
 </div>
 <div class="status-dot"></div>
 </div>

 <!-- Quick chips -->

 <div class="chips-row" id="chips">
 <button class="chip" onclick="sendChip(this)">🗓 Book a trip</button>
 <button class="chip" onclick="sendChip(this)">🐳 Whale season</button>
 <button class="chip" onclick="sendChip(this)">⏱ Trip duration</button>
 <button class="chip" onclick="sendChip(this)">🌊 Seasickness tips</button>
 <button class="chip" onclick="sendChip(this)">👨‍👩‍👧 Family friendly?</button>
 <button class="chip" onclick="sendChip(this)">🌿 Eco mission</button>
 </div>

 <!-- Chat -->

 <div class="chat" id="chat"></div>

 <!-- Input -->

 <div class="input-area">
 <div class="input-wrap">
 <textarea id="input" rows="1" placeholder="Ask Pearl anything about our whale watching tours…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
 <button class="send-btn" onclick="send()">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
 <line x1="22" y1="2" x2="11" y2="13"></line>
 <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
 </svg>
 </button>
 </div>
 <div class="footer-note">Pearl · Powered by ChatLocal AI · Freedom Ecotours Pty Ltd</div>
 </div>

 <!-- Wave decoration -->

 <svg class="wave-decoration" viewBox="0 0 1440 120" preserveAspectRatio="none">
 <path d="M0,60 C360,120 720,0 1080,60 C1260,90 1380,45 1440,60 L1440,120 L0,120 Z" fill="#2aab99"/>
 </svg>

 <script>
 const SYSTEM_PROMPT = `You are Pearl, a warm and knowledgeable eco-focused chatbot for Freedom Ecotours in Hervey Bay, Queensland, Australia.

Freedom Ecotours is a passionate, owner-operated small boat whale watching company run by Mark and skipper Toni. They are known for:
- Perfect 5.0 star Google rating with 551+ reviews
- Intimate small boat experience (lower boat = closer to whales)
- Deep commitment to marine conservation and whale welfare
- Exceptional food and hospitality on board
- Expert knowledge of humpback whale behaviour
- Season runs July to November (peak: August–October)
- Whale watching tours depart from Urangan Marina, Hervey Bay QLD
- Phone: 0448 773 668
- Website: freedomwhalewatch.com.au

YOUR PERSONALITY:
- Warm, genuine, passionate about ocean conservation
- Knowledgeable but approachable — never preachy
- Reference the whales with care and respect
- Reflect Freedom Ecotours' family-run, personal feel
- Short, friendly responses (2-4 sentences max unless detail is needed)
- Use occasional ocean/whale emojis naturally 🐋🌊🐬

WHAT YOU HELP WITH:
- Booking enquiries and availability (direct them to call or visit website for actual bookings)
- Trip information: duration (~4-5 hours), what to bring, what to expect
- Whale season and migration info
- Seasickness advice (calm bay, low boat helps a lot)
- Family friendliness (yes, all ages welcome)
- Conservation mission and eco practices
- Food and amenities on board
- Location and parking at Urangan Marina

BOOKING: Always invite them to call 0448 773 668 or visit freedomwhalewatch.com.au to secure their spot.`;

 let messages = [];
 let isTyping = false;

 // Generate particles
 const particlesEl = document.getElementById('particles');
 for (let i = 0; i < 12; i++) {
 const p = document.createElement('div');
 p.className = 'particle';
 const size = Math.random() * 4 + 2;
 p.style.cssText = `
 width: ${size}px; height: ${size}px;
 left: ${Math.random() * 100}%;
 animation-duration: ${Math.random() * 15 + 10}s;
 animation-delay: ${Math.random() * 10}s;
 opacity: ${Math.random() * 0.4 + 0.1};
 `;
 particlesEl.appendChild(p);
 }

 // Initial greeting
 window.addEventListener('load', () => {
 setTimeout(() => {
 addBotMessage("G'day! I'm Pearl 🐋 — your guide to an unforgettable whale watching experience with Freedom Ecotours right here in Hervey Bay.\n\nWhether you're curious about booking, our conservation mission, or what to expect on the water — I'm here to help. What would you like to know?");
 }, 600);
 });

 function addBotMessage(text) {
 const chat = document.getElementById('chat');
 const msg = document.createElement('div');
 msg.className = 'msg bot';
 msg.innerHTML = `
 <div class="msg-avatar">🐋</div>
 <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
 `;
 chat.appendChild(msg);
 chat.scrollTop = chat.scrollHeight;
 }

 function addUserMessage(text) {
 const chat = document.getElementById('chat');const msg = document.createElement('div');
 msg.className = 'msg user';
 msg.innerHTML = '<div class="bubble">'+text+'</div>';
 chat.appendChild(msg);
 chat.scrollTop = chat.scrollHeight;
 }

 function showTyping() {
 const chat = document.getElementById('chat');
 const typing = document.createElement('div');
 typing.className = 'msg bot';
 typing.id = 'typing-indicator';
 typing.innerHTML = `
 <div class="msg-avatar">🐋</div>
 <div class="bubble">
 <div class="typing"><span></span><span></span><span></span></div>
 </div>
 `;
 chat.appendChild(typing);
 chat.scrollTop = chat.scrollHeight;
 }

 function hideTyping() {
 const t = document.getElementById('typing-indicator');
 if (t) t.remove();
 }

 async function send() {
 const input = document.getElementById('input');
 const text = input.value.trim();
 if (!text || isTyping) return;

 input.value = '';
 input.style.height = 'auto';
 addUserMessage(text);
 messages.push({ role: 'user', content: text });

 isTyping = true;
 showTyping();

 try {
 const res = await fetch('/api/chat', {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({
 messages: [
 { role: 'system', content: SYSTEM_PROMPT },
 ...messages
 ]
 })
 });

 const data = await res.json();
 const reply = data.choices?.[0]?.message?.content || "Sorry, I had a little hiccup there. Please try again! 🌊";

 hideTyping();
 messages.push({ role: 'assistant', content: reply });
 addBotMessage(reply);
 } catch (e) {
 hideTyping();
 addBotMessage("Oops — looks like a wave hit our signal! Try again in a moment 🌊");
 }

 isTyping = false;
 }

 function sendChip(chip) {
 const text = chip.textContent.replace(/^[^\w]*/, '').trim();
 document.getElementById('input').value = text;
 send();
 }

 function handleKey(e) {
 if (e.key === 'Enter' && !e.shiftKey) {
 e.preventDefault();
 send();
 }
 }

 function autoResize(el) {
 el.style.height = 'auto';
 el.style.height = Math.min(el.scrollHeight, 100) + 'px';
 }
 </script>

</body>
</html>
