<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enzo's on the Beach | Bella — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean: #1a4a6b;
    --ocean-mid: #2a6a8b;
    --sunset: #e8754a;
    --sunset-light: #f5a07a;
    --sand: #faf5ed;
    --sand-dark: #f0e8d8;
    --foam: #ffffff;
    --text: #1a2a35;
    --muted: #7a8a90;
    --border: #dde8ed;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(160deg, #1a3a5a 0%, #2a5a7a 50%, #e8754a 100%);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 16px; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='100' height='50' viewBox='0 0 100 50' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 25 Q25 10 50 25 Q75 40 100 25' fill='none' stroke='rgba(255,255,255,0.04)' stroke-width='1.5'/%3E%3C/svg%3E") repeat;
    pointer-events: none;
  }
  .wrapper { width: 100%; max-width: 400px; border-radius: 24px; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.4); position: relative; z-index: 1; }
  .header { background: linear-gradient(135deg, #1a3a5a, #2a5a7a); padding: 20px; display: flex; align-items: center; gap: 14px; position: relative; overflow: hidden; }
  .header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--sunset), var(--sunset-light), transparent); }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--sunset), var(--sunset-light)); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; position: relative; }
  .online { position: absolute; bottom: 1px; right: 1px; width: 12px; height: 12px; background: #4ade80; border-radius: 50%; border: 2px solid #1a3a5a; }
  .header-info h2 { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; color: #fff; letter-spacing: 0.02em; }
  .header-info p { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px; }
  .header-badge { margin-left: auto; font-size: 9px; color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); padding: 3px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; font-family: 'DM Mono', monospace; letter-spacing: 0.05em; }
  .chat { background: var(--sand); height: 430px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
  .chat::-webkit-scrollbar { width: 3px; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .msg { display: flex; gap: 8px; animation: pop 0.25s ease both; }
  @keyframes pop { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
  .msg.user { flex-direction: row-reverse; }
  .msg-av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 2px; }
  .msg.ai .msg-av { background: linear-gradient(135deg, var(--sunset), var(--sunset-light)); }
  .msg.user .msg-av { background: var(--ocean); }
  .bubble { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
  .msg.ai .bubble { background: var(--foam); color: var(--text); border-top-left-radius: 4px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .msg.user .bubble { background: var(--ocean); color: white; border-top-right-radius: 4px; }
  .card-bubble { max-width: 92%; }
  .card { background: var(--foam); border: 1px solid var(--border); border-radius: 16px; border-top-left-radius: 4px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .card-header { background: linear-gradient(135deg, var(--ocean), var(--ocean-mid)); color: white; padding: 10px 14px; font-size: 13px; font-weight: 500; }
  .card-body { padding: 12px 14px; font-size: 13px; color: var(--text); line-height: 1.7; }
  .card-body b { color: var(--ocean); }
  .card-btn { display: block; margin: 6px 14px; background: var(--sunset); color: white; text-decoration: none; text-align: center; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 500; transition: background 0.15s; }
  .card-btn:last-child { margin-bottom: 12px; }
  .card-btn:hover { background: var(--sunset-light); }
  .card-btn.secondary { background: var(--ocean); }
  .card-btn.secondary:hover { background: var(--ocean-mid); }
  .typing { display: flex; gap: 8px; align-items: center; }
  .typing-av { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--sunset), var(--sunset-light)); display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .typing-bubble { background: var(--foam); border: 1px solid var(--border); border-radius: 16px; border-top-left-radius: 4px; padding: 12px 16px; display: flex; gap: 4px; align-items: center; }
  .typing-bubble span { width: 6px; height: 6px; border-radius: 50%; background: var(--sunset); animation: bounce 1.2s infinite; }
  .typing-bubble span:nth-child(2){animation-delay:0.2s}
  .typing-bubble span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
  .quick-wrap { background: var(--sand-dark); padding: 10px 12px; display: flex; flex-wrap: wrap; gap: 7px; border-top: 1px solid var(--border); }
  .qr { background: var(--foam); border: 1px solid var(--border); color: var(--ocean); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 7px 12px; border-radius: 20px; cursor: pointer; transition: all 0.15s; min-height: 34px; }
  .qr:hover, .qr:active { background: var(--sunset); color: white; border-color: var(--sunset); }
  .input-row { background: var(--foam); border-top: 1px solid var(--border); padding: 10px 12px; display: flex; gap: 8px; align-items: flex-end; }
  #msg { flex: 1; border: 1px solid var(--border); border-radius: 20px; padding: 10px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--sand); outline: none; resize: none; max-height: 90px; line-height: 1.4; min-height: 42px; }
  #msg:focus { border-color: var(--sunset); }
  #msg::placeholder { color: var(--muted); }
  .send { width: 42px; height: 42px; border-radius: 50%; background: var(--sunset); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .send:hover { background: var(--ocean); }
  .send:active { transform: scale(0.92); }
  .send svg { width: 17px; height: 17px; fill: white; }
  .footer { background: var(--foam); text-align: center; padding: 8px; font-size: 10px; color: var(--muted); border-top: 1px solid var(--border); }
  .footer a { color: var(--sunset); text-decoration: none; }
  /* Floating call button */
  .float-call { position: fixed; bottom: 80px; right: 20px; width: 48px; height: 48px; background: var(--sunset); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 16px rgba(232,117,74,0.5); cursor: pointer; text-decoration: none; z-index: 100; transition: transform 0.2s; }
  .float-call:hover { transform: scale(1.1); }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="avatar">🌅<div class="online"></div></div>
    <div class="header-info">
      <h2>Bella</h2>
      <p>Enzo's on the Beach · Hervey Bay 🌊</p>
    </div>
    <div class="header-badge">AI ASSISTANT</div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="quick-wrap">
    <button class="qr" onclick="quick('What are your opening hours?')">🕐 Hours</button>
    <button class="qr" onclick="showMenu()">🍽️ Menu</button>
    <button class="qr" onclick="showBooking()">📅 Book Table</button>
    <button class="qr" onclick="quick('Is there live music on?')">🎵 Live Music</button>
    <button class="qr" onclick="showDrinks()">🍸 Drinks</button>
    <button class="qr" onclick="showFunctions()">🎉 Functions</button>
    <button class="qr" onclick="quick('Do you have vegetarian options?')">🌱 Veg Options</button>
    <button class="qr" onclick="showHuman()">👤 Talk to Team</button>
  </div>
  <div class="input-row">
    <textarea id="msg" placeholder="Ask Bella anything..." rows="1" onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
    <button class="send" onclick="send()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
  </div>
  <div class="footer">Powered by <a href="#">Groq AI</a> · <a href="https://www.enzosonthebeach.com.au" target="_blank">enzosonthebeach.com.au</a></div>
</div>

<a href="tel:0741246375" class="float-call" title="Call Enzo's">📞</a>

<script>
const GROQ_API_KEY = "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";

const SYSTEM_PROMPT = `You are Bella, the friendly AI assistant for Enzo's on the Beach — a beautiful beachside restaurant and bar in Hervey Bay, Queensland, Australia.

YOUR PERSONALITY:
- Warm, relaxed and beachy — like a friendly local who loves good food
- Use occasional beach and sunset emojis 🌅🌊🍽️
- Keep replies SHORT — 2 to 3 sentences max
- Always end with a helpful offer

RESTAURANT DETAILS:
- Name: Enzo's on the Beach
- Address: 351A Esplanade, Scarness, Hervey Bay QLD 4655
- Phone: (07) 4124 6375
- Website: enzosonthebeach.com.au
- Vibe: Relaxed beachside dining with stunning ocean views, dog friendly

OPENING HOURS:
- Monday to Thursday: 6:30am – 9:00pm
- Friday: 6:30am – Late
- Saturday: 6:30am – Late
- Sunday: 6:30am – 9:00pm

MENUS: Full menu, Kids menu, Functions menu, Spirits menu
GIFT CARDS: Available online
BOOKINGS: enzosonthebeach.com.au/book or call (07) 4124 6375
LIVE MUSIC: Regular weekend acts — check enzosonthebeach.com.au/events
FUNCTIONS & EVENTS: Weddings, birthdays, corporate — enzosonthebeach.com.au/menus/function
SPECIALS: Ask our team about today's specials by calling (07) 4124 6375

RULES:
- Never make up specific prices
- If unsure: "Give us a call on (07) 4124 6375!"
- Never discuss anything unrelated to Enzo's`;

function showMenu() {
  addCard(`<div class="card-header">🍽️ Enzo's Menu</div>
    <div class="card-body">
      <b>Breakfast</b> (from 6:30am daily)<br>Eggs, avo toast, cafe classics & more<br><br>
      <b>Lunch & Dinner</b><br>Fresh seafood, salads, mains & cocktails<br><br>
      <b>Also:</b> Kids menu · Spirits menu · Functions menu<br><br>
      🌱 Vegetarian options available · 🐾 Dog friendly outdoors
    </div>
    <a class="card-btn" href="https://www.enzosonthebeach.com.au/_files/ugd/4c0fa4_f421212900994a7cb38a53e08001ae93.pdf" target="_blank">View Full Menu PDF →</a>
    <a class="card-btn secondary" href="tel:0741246375">📞 Ask About Today's Specials</a>`);
}

function showBooking() {
  addCard(`<div class="card-header">📅 Book a Table at Enzo's</div>
    <div class="card-body">
      <b>351A Esplanade, Scarness, Hervey Bay</b><br><br>
      🕐 Mon–Thu: 6:30am–9pm<br>
      🌅 Fri–Sat: 6:30am–Late<br>
      ☀️ Sun: 6:30am–9pm<br><br>
      Bookings recommended for weekends & groups!
    </div>
    <a class="card-btn" href="https://www.enzosonthebeach.com.au/book" target="_blank">Book Online →</a>
    <a class="card-btn secondary" href="tel:0741246375">📞 Call to Book</a>`);
}

function showDrinks() {
  addCard(`<div class="card-header">🍸 Drinks Menu</div>
    <div class="card-body">
      <b>Full Bar</b><br>Cocktails, wines, beers & spirits<br><br>
      <b>Spirits Menu</b><br>Extensive selection of premium spirits<br><br>
      🍹 Perfect for a sunset cocktail on the beach!
    </div>
    <a class="card-btn" href="https://www.enzosonthebeach.com.au/menus/spirits" target="_blank">View Spirits Menu →</a>
    <a class="card-btn secondary" href="https://www.enzosonthebeach.com.au/book" target="_blank">Book a Table →</a>`);
}

function showFunctions() {
  addCard(`<div class="card-header">🎉 Functions & Events</div>
    <div class="card-body">
      <b>We host it all!</b><br>
      Weddings · Birthdays · Corporate events<br>Work Christmas parties · Private dining<br><br>
      Stunning beachfront venue with ocean views 🌊<br><br>
      Call us to discuss your event!
    </div>
    <a class="card-btn" href="https://www.enzosonthebeach.com.au/menus/function" target="_blank">View Functions Menu →</a>
    <a class="card-btn secondary" href="tel:0741246375">📞 Enquire Now</a>`);
}

function showHuman() {
  addCard(`<div class="card-header">👤 Talk to Our Team</div>
    <div class="card-body">
      <b>Need more help?</b><br>
      Our friendly team is happy to assist with anything — bookings, dietary needs, group enquiries or functions.<br><br>
      🕐 Available during opening hours
    </div>
    <a class="card-btn" href="tel:0741246375">📞 Call (07) 4124 6375</a>
    <a class="card-btn secondary" href="https://www.facebook.com/enzosonthebeach" target="_blank">💬 Message on Facebook</a>`);
}

function addCard(innerHTML) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="msg-av">🌅</div><div class="card-bubble"><div class="card">${innerHTML}</div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

const FALLBACK = {
  hours: "We're open 7 days from 6:30am 🕐 Mon–Thu until 9pm, Fri–Sat until late, Sun until 9pm. Perfect for a sunrise brekky or sunset cocktail! 🌅",
  music: "We have regular live music on weekends 🎵 Check enzosonthebeach.com.au/events for upcoming acts — great vibes by the beach!",
  veg: "Yes! We have vegetarian options available 🌱 Check our full menu or call us on (07) 4124 6375 for details 😊",
  gift: "Yes! Gift cards available online 🎁 Perfect for treating someone to a beachside meal. Visit enzosonthebeach.com.au 😊",
  parking: "There's parking along the Esplanade 🚗 We're at 351A Esplanade, Scarness — easy to find right on the beach!",
  dog: "Yes we're dog friendly! 🐾 Our outdoor areas welcome furry friends. See you soon! 🌊",
  specials: "Our specials change daily 🌟 Give us a call on (07) 4124 6375 to find out what's on today!",
  default: "Hey! I'm Bella from Enzo's on the Beach 🌅 I can help with hours, menu, bookings, live music or functions. What would you like to know? 🌊"
};

function getFallback(text) {
  const t = text.toLowerCase();
  if (t.includes('hour') || t.includes('open') || t.includes('close') || t.includes('time')) return FALLBACK.hours;
  if (t.includes('menu') || t.includes('food') || t.includes('eat') || t.includes('breakfast') || t.includes('lunch') || t.includes('dinner')) { showMenu(); return null; }
  if (t.includes('book') || t.includes('reserv') || t.includes('table')) { showBooking(); return null; }
  if (t.includes('drink') || t.includes('cocktail') || t.includes('wine') || t.includes('spirit') || t.includes('beer')) { showDrinks(); return null; }
  if (t.includes('function') || t.includes('wedding') || t.includes('event') || t.includes('birthday') || t.includes('corporate')) { showFunctions(); return null; }
  if (t.includes('human') || t.includes('person') || t.includes('staff') || t.includes('team') || t.includes('speak')) { showHuman(); return null; }
  if (t.includes('music') || t.includes('live') || t.includes('band') || t.includes('dj')) return FALLBACK.music;
  if (t.includes('veg') || t.includes('plant') || t.includes('dietary') || t.includes('gluten')) return FALLBACK.veg;
  if (t.includes('gift') || t.includes('voucher')) return FALLBACK.gift;
  if (t.includes('park')) return FALLBACK.parking;
  if (t.includes('dog') || t.includes('pet')) return FALLBACK.dog;
  if (t.includes('special') || t.includes('today')) return FALLBACK.specials;
  return FALLBACK.default;
}

let history = [{ role: 'system', content: SYSTEM_PROMPT }];

async function send() {
  const input = document.getElementById('msg');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  const t = text.toLowerCase();
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  if (t.includes('menu') || t.includes('food') || t.includes('eat') || t.includes('breakfast') || t.includes('lunch') || t.includes('dinner')) { showMenu(); history.push({ role: 'assistant', content: "Here's our menu!" }); return; }
  if (t.includes('book') || t.includes('reserv') || t.includes('table')) { showBooking(); history.push({ role: 'assistant', content: "Here's our booking info!" }); return; }
  if (t.includes('drink') || t.includes('cocktail') || t.includes('spirit') || t.includes('wine')) { showDrinks(); history.push({ role: 'assistant', content: "Here's our drinks menu!" }); return; }
  if (t.includes('function') || t.includes('wedding') || t.includes('event')) { showFunctions(); history.push({ role: 'assistant', content: "Here's our functions info!" }); return; }
  if (t.includes('human') || t.includes('person') || t.includes('speak') || t.includes('staff')) { showHuman(); history.push({ role: 'assistant', content: "Here's how to reach our team!" }); return; }
  showTyping();
  if (!GROQ_API_KEY || GROQ_API_KEY === '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') {
    await delay(700); hideTyping();
    const reply = getFallback(text);
    if (reply) { addMsg('ai', reply); history.push({ role: 'assistant', content: reply }); }
    return;
  }
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
      body: JSON.stringify({ model: 'llama-3.1-8b-instant', messages: history, max_tokens: 200, temperature: 0.8 })
    });
    const data = await res.json();
    hideTyping();
    const reply = data.choices?.[0]?.message?.content || getFallback(text);
    if (reply) { addMsg('ai', reply); history.push({ role: 'assistant', content: reply }); }
  } catch(err) { hideTyping(); const reply = getFallback(text); if (reply) addMsg('ai', reply); }
}

function quick(text) { document.getElementById('msg').value = text; send(); }
function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-av">${role === 'ai' ? '🌅' : '👤'}</div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}
let typingEl = null;
function showTyping() {
  const chat = document.getElementById('chat');
  typingEl = document.createElement('div'); typingEl.className = 'typing';
  typingEl.innerHTML = `<div class="typing-av">🌅</div><div class="typing-bubble"><span></span><span></span><span></span></div>`;
  chat.appendChild(typingEl); chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function resize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 90) + 'px'; }
window.onload = () => {
  setTimeout(() => {
    addMsg('ai', "G'day! Welcome to Enzo's on the Beach! 🌅\n\nI'm Bella — your beachside assistant! 🌊\n\nI can help with our menu, hours, bookings, live music, functions or anything else. What can I do for you? ☀️");
  }, 400);
};
</script>
</body>
</html>
